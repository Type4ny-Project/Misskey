name: Deploy Cloudflare Worker

on:
  push:
    branches:
      - master
      - develop
    paths:
      - packages/frontend/**
      - packages/frontend-shared/**
      - packages/frontend-builder/**
      - packages/frontend-embed/**
      - packages/frontend-worker/**
      - packages/sw/**
      - packages/misskey-js/**
      - packages/i18n/**
      - packages/icons-subsetter/**
      - .github/workflows/deploy-cloudflare-worker.yml
  workflow_dispatch:

jobs:
  check-backend-changes:
    name: Check for backend changes
    runs-on: ubuntu-latest
    outputs:
      backend-changed: ${{ steps.check.outputs.backend-changed }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Check if backend files changed
        id: check
        run: |
          BACKEND_CHANGED=$(git diff --name-only ${{ github.event.before }} ${{ github.sha }} | grep -c -E '^(packages/backend/|packages/misskey-reversi/|packages/misskey-bubble-game/)' || true)
          if [ "$BACKEND_CHANGED" -gt 0 ]; then
            echo "backend-changed=true" >> $GITHUB_OUTPUT
            echo "Backend files also changed. Skipping worker deploy to avoid inconsistency."
          else
            echo "backend-changed=false" >> $GITHUB_OUTPUT
            echo "Only frontend files changed. Proceeding with worker deploy."
          fi

  deploy:
    name: Deploy frontend-worker to Cloudflare Workers
    runs-on: ubuntu-latest
    needs: check-backend-changes
    if: needs.check-backend-changes.outputs.backend-changed == 'false'
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          submodules: true

      - name: Setup pnpm
        uses: pnpm/action-setup@v4.4.0

      - name: Setup Node.js
        uses: actions/setup-node@v6.3.0
        with:
          node-version-file: '.node-version'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm i --frozen-lockfile

      - name: Build
        run: pnpm build:cloudflare-worker

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          workingDirectory: packages/frontend-worker
          command: deploy
